<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="style.css" as="style" onload="this.rel='stylesheet'">
    <link rel="preload" href="script.js" as="script">
    <link rel="icon" href="assets/dressup/img" type="image/png">
    <title>TITLE</title>
</head>

<body>
    <div id="header"></div>
    <div id="content">
        <div id="dressup">
            <div id="container">
                <img src="" alt="accessories" id="accessories" class="dressup">
                <img src="" alt="top" id="top" class="dressup">
                <img src="" alt="bottom" id="bottom" class="dressup">
                <img src="assets/dressup/cat_body.PNG" alt="body" id="body" class="dressup">
            </div>
        </div>
        <div id="clothes">
            <div class="clothes">
                <p>Accessories</p>
                <div class="showcase">
                    <button id="showcase_btn_left_accessories"><</button>
                    <div id="showcase_img_accessories"></div>
                    <button id="showcase_btn_right_accessories">></button>
                </div>
            </div>
            <div class="clothes">
                <p>Tops</p>
                <div class="showcase">
                    <button id="showcase_btn_left_top"><</button>
                    <div id="showcase_img_top"></div>
                    <button id="showcase_btn_right_top">></button>
                </div>
            </div>
            <div class="clothes">
                <p>Bottoms</p>
                <div class="showcase">
                    <button id="showcase_btn_left_bottom"><</button>
                    <div id="showcase_img_bottom"></div>
                    <button id="showcase_btn_right_bottom">></button>
                </div>
            </div>
        </div>
    </div>
    <div id="footer"></div>
</body>

<script src="script.js"></script>
</html>
