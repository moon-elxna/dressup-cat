<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="style.css" as="style" onload="this.rel='stylesheet'">
    <link rel="preload" href="script.js" as="script">
    <link rel="icon" href="assets\showcase\top2.PNG" type="image/png">
    <title>Dress-Up</title>
</head>

<body>
    <div>
        <div id="header">
            <p>Dress-Up Cat Game</p>
            <hr>
        </div>
        <div id="content">
            <div>
            <div id="dressup">
                <div>
                    <img src="" alt="accessories" id="accessories">
                    <img src="" alt="top" id="top">
                    <img src="" alt="bottom" id="bottom">
                    <img src="assets/dressup/cat_body.PNG" alt="body" id="body">
                </div>
            </div>
            <div id="tools">
                <button id="save"><p>Save</p></button>
                <button id="share"><p>Share</p></button>
            </div>
            </div>
            <div id="clothes">
                <div>
                    <p>Accessories</p>
                    <div class="showcase">
                        <button id="showcase_btn_left_accessories"></button>
                        <div id="showcase_img_accessories"></div>
                        <button id="showcase_btn_right_accessories"></button>
                    </div>
                </div>
                <div>
                    <p>Tops</p>
                    <div class="showcase">
                        <button id="showcase_btn_left_top"></button>
                        <div id="showcase_img_top"></div>
                        <button id="showcase_btn_right_top"></button>
                    </div>
                </div>
                <div>
                    <p>Bottoms</p>
                    <div class="showcase">
                        <button id="showcase_btn_left_bottom"></button>
                        <div id="showcase_img_bottom"></div>
                        <button id="showcase_btn_right_bottom"></button>
                    </div>
                </div>
            </div>
        </div>
        <div id="footer"></div>
    </div>
</body>

<script src="script.js"></script>
</html>
